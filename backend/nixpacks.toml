# Tell Nixpacks the Python project root is ./backend/
# and to also build the frontend

[phases.setup]
nixPkgs = ["python311", "nodejs_22"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "cd ../frontend && npm install",
    "cd ../frontend && npm run build",
    "mkdir -p static",
    "cp -r ../frontend/dist/* static/",
]

[start]
cmd = "python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[variables]
NIXPACKS_PYTHON_ROOT = "backend"
