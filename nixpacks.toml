# Balance OS — Railway/Nixpacks build config
# 
# Nixpacks auto-detects Python at backend/app/ which breaks the build.
# We override the provider to use backend/ as the app directory.

[providers.python]
appDir = "."

[phases.setup]
nixPkgs = ["python311", "nodejs_22"]

[phases.install]
cmds = [
    "pip install -r backend/requirements.txt",
    "cd frontend && npm install",
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "mkdir -p backend/static",
    "cp -r frontend/dist/* backend/static/",
]

[start]
cmd = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
